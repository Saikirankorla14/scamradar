<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library — ScamRadar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/animations.css">
<style>
.library-layout { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
.library-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
.library-header h2 { font-family: var(--display); font-size: 24px; font-weight: 700; letter-spacing: -0.03em; }
.library-header p { font-size: 13px; color: var(--text3); margin-top: 4px; }
.lib-actions { display: flex; gap: 8px; }
.lib-btn { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); padding: 7px 14px; border-radius: var(--radius-sm); font-family: var(--body); font-size: 12.5px; cursor: pointer; transition: all 0.12s; }
.lib-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.lib-btn.danger:hover { color: var(--red); border-color: rgba(232,64,64,0.3); }

.filter-bar { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.filter-chip { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); color: var(--text2); background: var(--surface2); cursor: pointer; transition: all 0.12s; }
.filter-chip:hover, .filter-chip.active { background: var(--surface3); color: var(--text); border-color: var(--border2); }
.filter-chip.active { color: var(--accent); border-color: rgba(255,85,51,0.3); background: var(--accent-dim); }

.lib-empty { text-align: center; padding: 4rem 2rem; color: var(--text3); }
.lib-empty-icon { font-size: 40px; opacity: 0.3; margin-bottom: 1rem; }
.lib-empty h3 { font-family: var(--display); font-size: 18px; color: var(--text2); margin-bottom: 8px; }
.lib-empty p { font-size: 13px; line-height: 1.6; max-width: 320px; margin: 0 auto 1.5rem; }
.goto-gen { background: var(--accent); color: #fff; border: none; padding: 9px 20px; border-radius: var(--radius-sm); font-family: var(--body); font-size: 13px; cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-block; }
.goto-gen:hover { background: #ff6644; }

.lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.lib-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: all 0.15s; }
.lib-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.lc-header { padding: 10px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.lc-icon { font-size: 16px; }
.lc-type { font-size: 12px; font-weight: 500; color: var(--text); flex: 1; }
.lc-medium { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; }
.lc-body { padding: 12px; }
.lc-preview { font-size: 12px; color: var(--text2); line-height: 1.6; font-family: var(--mono); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; }
.lc-footer { display: flex; align-items: center; justify-content: space-between; }
.lc-flags { font-size: 11px; color: var(--red); }
.lc-time { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.lc-delete { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 3px; transition: color 0.12s; }
.lc-delete:hover { color: var(--red); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); max-width: 680px; width: 100%; max-height: 80vh; overflow-y: auto; }
.modal-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface2); position: sticky; top: 0; }
.modal-title { font-family: var(--display); font-size: 16px; font-weight: 700; flex: 1; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 1.25rem; font-family: var(--mono); font-size: 13px; line-height: 1.8; color: var(--text); }
.modal-flags { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="../index.html" class="logo">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L14 13H2L8 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><line x1="8" y1="6.5" x2="8" y2="9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="8" cy="11" r="0.7" fill="currentColor"/></svg>
      </div>
      <span class="logo-text">ScamRadar</span>
      <span class="logo-badge">Educational</span>
    </a>
    <nav class="nav">
      <a href="../index.html" class="nav-link">Generator</a>
      <a href="analyze.html" class="nav-link">Analyze</a>
      <a href="library.html" class="nav-link active">Library</a>
      <a href="about.html" class="nav-link">About</a>
    </nav>
  </div>
</header>

<div class="library-layout">
  <div class="library-header">
    <div>
      <h2>Saved Library</h2>
      <p>Your saved scam mockups for reference and training</p>
    </div>
    <div class="lib-actions">
      <button class="lib-btn danger" onclick="clearLibrary()">Clear all</button>
    </div>
  </div>

  <div id="filterBar" class="filter-bar" style="display:none;"></div>

  <div id="libContent"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">—</span>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-flags" id="modalFlags"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function getLibrary() {
  try {
    const s = sessionStorage.getItem('scamradar_state');
    return s ? (JSON.parse(s).library || []) : [];
  } catch { return []; }
}

function saveLibrary(lib) {
  try {
    const s = sessionStorage.getItem('scamradar_state');
    const state = s ? JSON.parse(s) : {};
    state.library = lib;
    sessionStorage.setItem('scamradar_state', JSON.stringify(state));
  } catch {}
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getMediumClass(m) {
  return { phone:'badge-phone', sms:'badge-sms', email:'badge-email', voicemail:'badge-voicemail', chat:'badge-chat', letter:'badge-letter' }[m] || 'badge-phone';
}

let currentFilter = 'all';
let library = [];

function render() {
  library = getLibrary();
  const content = document.getElementById('libContent');
  const filterBar = document.getElementById('filterBar');

  if (!library.length) {
    filterBar.style.display = 'none';
    content.innerHTML = `<div class="lib-empty">
      <div class="lib-empty-icon">📁</div>
      <h3>No saved mockups</h3>
      <p>Generate scam mockups from the Generator page and click "Save to Library" to keep them here for reference.</p>
      <a href="../index.html" class="goto-gen">Go to Generator</a>
    </div>`;
    return;
  }

  // Filter bar
  const types = [...new Set(library.map(l => l.scamType))];
  filterBar.style.display = 'flex';
  filterBar.innerHTML = `<div class="filter-chip ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">All (${library.length})</div>` +
    types.map(t => `<div class="filter-chip ${currentFilter===t?'active':''}" onclick="setFilter('${t.replace(/'/g,"\\'")}')">${escHtml(t.split('/')[0].trim())}</div>`).join('');

  const filtered = currentFilter === 'all' ? library : library.filter(l => l.scamType === currentFilter);

  if (!filtered.length) {
    content.innerHTML = `<div class="lib-empty"><p>No items match this filter.</p></div>`;
    return;
  }

  content.innerHTML = `<div class="lib-grid">${filtered.map((item, i) => {
    const realIdx = library.indexOf(item);
    const preview = (item.data?.content || '').substring(0, 180);
    const flagCount = item.data?.redFlags?.length || 0;
    const date = item.savedAt ? new Date(item.savedAt).toLocaleDateString() : '—';
    return `<div class="lib-card" onclick="openModal(${realIdx})">
      <div class="lc-header">
        <span class="lc-icon">${item.data?.icon || '⚠'}</span>
        <span class="lc-type">${escHtml(item.scamType)}</span>
        <span class="lc-medium ${getMediumClass(item.medium)}">${(item.medium||'').toUpperCase()}</span>
      </div>
      <div class="lc-body">
        <div class="lc-preview">${escHtml(preview)}${preview.length >= 180 ? '...' : ''}</div>
        <div class="lc-footer">
          <span class="lc-flags">${flagCount} red flags</span>
          <span class="lc-time">${date}</span>
          <button class="lc-delete" onclick="deleteItem(event,${realIdx})" title="Delete">×</button>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function setFilter(f) {
  currentFilter = f;
  render();
}

function openModal(idx) {
  const item = library[idx];
  if (!item) return;
  document.getElementById('modalTitle').textContent = item.scamType;
  document.getElementById('modalBody').textContent = item.data?.content || '';
  const flags = item.data?.redFlags || [];
  document.getElementById('modalFlags').innerHTML = flags.length ? `
    <div style="font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;">Red Flags</div>
    <div style="display:flex;flex-direction:column;gap:5px;">${flags.map(f => `<div class="flag-item"><span style="color:var(--red);flex-shrink:0;font-size:10px;">⚑</span>${escHtml(f)}</div>`).join('')}</div>
  ` : '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) { if (e.target.id === 'modalOverlay') closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); }

function deleteItem(e, idx) {
  e.stopPropagation();
  library.splice(idx, 1);
  saveLibrary(library);
  render();
}

function clearLibrary() {
  if (!library.length) return;
  saveLibrary([]);
  library = [];
  currentFilter = 'all';
  render();
  showToast('Library cleared');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });
render();
</script>
</body>
</html>
